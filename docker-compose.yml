services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flight-scout-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    working_dir: /app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: node:22-alpine
    container_name: flight-scout-frontend
    working_dir: /app
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_BACKEND_URL=${NEXT_PUBLIC_BACKEND_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"
    depends_on:
      - backend
